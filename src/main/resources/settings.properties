# ============================================================
# VEBO Lagersystem – Application Settings
# ============================================================
# All changes take effect after restarting the application,
# unless stated otherwise.
# ============================================================

# --- Data Source ---
# If true, articles/data are loaded from JSON/YAML files instead of the database.
# Supported: true | false
load-from-files=true

# --- Database ---
# Backend used to persist all application data.
# Supported values: sqlite, h2, json, yaml
database_type=sqlite

# ============================================================
# Scheduler Settings
# ============================================================

# Interval for automatic stock-level checks (in minutes).
# Set to 0 to disable automatic checks.
stock_check_interval=30

# Interval for displaying low-stock warnings (in hours).
warning_display_interval=1

# ============================================================
# Updates & Integration
# ============================================================

# Personal GitHub token used to raise the API rate-limit for update checks.
# Replace the placeholder with your own token or leave as-is to use anonymous access.
github-token=your_github_token_here

# ============================================================
# Application State
# ============================================================

# Set to "true" after the first successful startup.
# Reset to "false" to trigger the first-time setup wizard again.
first-time=false

# ============================================================
# Display & Appearance
# ============================================================

# Font size for rows in the main article table (points).
table_font_size=16

# Enable dark mode.
# Supported: true | false
dark_mode=false

# Font size used in the detail/tab panels (points).
table_font_size_tab=15

# Font family used throughout the application UI.
# Examples: Dialog, Arial, SansSerif, Monospaced
font_style=Dialog

# ---- Theme colours (leave blank to use the built-in theme default) ----

# Background colour for table/panel headers  –  hex (#RRGGBB) or empty.
theme_header_color=

# Accent colour used for highlights and buttons  –  hex (#RRGGBB) or empty.
theme_accent_color=

# Default button colour  –  hex (#RRGGBB) or empty.
theme_button_color=

# ============================================================
# Warnings & Notifications
# ============================================================

# Show an automatic low-stock warning every hour.
# Supported: true | false
enable_hourly_warnings=true

# ============================================================
# QR-Code Import
# ============================================================

# Enable the automatic QR-code import background service.
# Supported: true | false
enable_automatic_import_qrcode=true

# Interval between automatic QR-code import runs (in minutes).
qrcode_import_interval=10

# ============================================================
# Stock Check Automation
# ============================================================

# Enable the automatic stock-level check background service.
# Supported: true | false
enable_auto_stock_check=true

# ============================================================
# Scan Server
# ============================================================

# Base URL of the VEBO scan/web server used for QR-code submissions.
server_url=https://framedev.ch/vebo

# ============================================================
# Maintenance
# ============================================================

# Delete application log files on startup to keep the logs folder clean.
# Supported: true | false
delete_old_logs_on_startup=false

# ============================================================
# Look & Feel
# ============================================================

# Swing Look-and-Feel class name to use for the application UI.
# Leave blank to fall back to the system default Look-and-Feel.
# Examples:
#   com.formdev.flatlaf.FlatLightLaf
#   com.formdev.flatlaf.FlatDarkLaf
#   javax.swing.plaf.nimbus.NimbusLookAndFeel
#   com.sun.java.swing.plaf.windows.WindowsLookAndFeel
look_and_feel=

# Hide the decorative coloured header banner shown at the top of each window.
# Useful on small screens or when a minimal UI is preferred.
# Supported: true | false
disable_header=false

# Scan server Port
scan_server_port=8080